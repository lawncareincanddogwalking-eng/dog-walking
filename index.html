<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAWS ON THE PATH | Toronto Dog Walking</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
            /* Blue side borders */
            border-left: 15px solid #2196F3;
            border-right: 15px solid #2196F3;
            min-height: 100vh;
        }

        header {
            background-color: #0d47a1; /* Deep Navy Blue */
            color: white;
            padding: 3rem 1rem;
            text-align: center;
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 2px;
        }

        nav {
            background-color: #1976d2; /* Sky Blue */
            display: flex;
            justify-content: center;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .hero {
            padding: 60px 20px;
            text-align: center;
            background-color: #ffffff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .price-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            margin: 40px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .price-amount {
            font-size: 4rem;
            font-weight: bold;
            color: #0d47a1;
        }

        .cta-button {
            display: inline-block;
            background-color: #ff9800;
            color: white;
            padding: 18px 35px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 20px;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

<header>
    <h1>PAWS ON THE PATH</h1>
    <p>Professional Walking for Every Breed</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="booking.html">Book Now</a>
</nav>

<section class="hero">
    <h2>Reliable Neighborhood Walks</h2>
    <p>Safe and fun exercise for your dog right here in Toronto.</p>
    <a href="booking.html" class="cta-button">Book a Walk</a>
</section>

<div class="container">
    <div class="gallery">
        <div class="gallery-item">
            <img src="golden_retriever.jpg" alt="Golden Retriever">
        </div>
        <div class="gallery-item">
            <img src="golden_doodle.jpg" alt="Golden Doodle">
        </div>
    </div>

    <div id="pricing" class="price-card">
        <h3>Flat Rate Walking</h3>
        <div class="price-amount">$20</div>
        <p>Per Walk</p>
        <a href="booking.html" class="cta-button">Reserve Your Spot</a>
    </div>
</div>

<footer>
    <p>&copy; 2026 PAWS ON THE PATH | Toronto, Ontario</p>
</footer>

</body>
</html>
